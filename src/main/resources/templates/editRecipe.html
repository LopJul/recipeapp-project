<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
  <head>
    <title>Edit Recipe</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="container edit-container">
      <h2 class="edit-title">Muokkaa reseptiä</h2>

      <form th:object="${recipe}" th:action="@{/update}" method="post">
        <input
          type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}" />
        <input type="hidden" th:field="*{id}" />

        <div>
          <label>Otsikko:</label><br />
          <input type="text" th:field="*{title}" />
          <div
            th:if="${#fields.hasErrors('title')}"
            th:errors="*{title}"
            class="error-text">
            Error
          </div>
        </div>

        <div>
          <label>Ohjeet:</label><br />
          <textarea th:field="*{instructions}"></textarea>
          <div
            th:if="${#fields.hasErrors('instructions')}"
            th:errors="*{instructions}"
            class="error-text">
            Error
          </div>
        </div>

        <div class="ingredients">
          <h3>Aineosat</h3>

          <div id="ingredients" class="add-ing">
            <div th:each="ri, iterStat : *{recipeIngredients}">
              <input
                type="hidden"
                th:field="*{recipeIngredients[__${iterStat.index}__].id}" />

              <input
                type="text"
                th:field="*{recipeIngredients[__${iterStat.index}__].ingredient.name}"
                placeholder="Ainesosa" />
            </div>
          </div>

          <button type="button" onclick="addIngredient()">
            Lisää ainesosa
          </button>
        </div>

        <br />
        <button type="submit">Tallenna muutokset</button>
      </form>

      <a href="/recipes" class="back button">Takaisin</a>

      <script>
        const container = document.getElementById("ingredients");
        let ingredientIndex = container.children.length;

        function addIngredient() {
          const div = document.createElement("div");

          div.innerHTML = `<input type="text"
      name="recipeIngredients[${ingredientIndex}].ingredient.name"
      placeholder="Ainesosa"/>`;

          container.appendChild(div);
          ingredientIndex++;
        }
      </script>
    </div>
  </body>
</html>
