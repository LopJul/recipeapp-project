<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
  <head>
    <title>Recipes</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="recipes-container">
      <div class="top-bar">
        <h1>Reseptit</h1>

        <div class="top-right">
          <div class="top-buttons">
            <div sec:authorize="hasAuthority('ROLE_ADMIN')">
              <a href="/addRecipe" class="button">Lisää resepti</a>
            </div>
            <a th:href="@{/favourites}" class="button"> Suosikit </a>

            <form th:action="@{/logout}" method="post">
              <input
                type="hidden"
                th:name="${_csrf.parameterName}"
                th:value="${_csrf.token}" />
              <input
                type="submit"
                class="button delete"
                value="Kirjaudu ulos" />
            </form>
          </div>

          <div class="user-info">
            <h3>Käyttäjä: <span sec:authentication="name"></span></h3>
          </div>
        </div>
      </div>

      <div th:if="${#lists.isEmpty(recipes)}">
        <p class="no-fav">Ei vielä lisättyjä reseptejä.</p>
      </div>

      <div th:each="recipe : ${recipes}" class="recipe">
        <h3 th:text="${recipe.title}"></h3>
        <p th:text="${recipe.instructions}"></p>

        <!-- <div th:if="${recipe.ingredients.size() > 0}">
          <h4>Aineosat:</h4>
          <ul>
            <li
              th:each="ingredient : ${recipe.ingredients}"
              th:text="${ingredient.name}"></li>
          </ul>
        </div> -->

        <div
          th:if="${recipe.recipeIngredients != null and !#lists.isEmpty(recipe.recipeIngredients)}">
          <h4>Aineosat:</h4>
          <ul>
            <li
              th:each="ri : ${recipe.recipeIngredients}"
              th:text="${ri.ingredient.name}"></li>
          </ul>
        </div>

        <div class="button-group">
          <div sec:authorize="hasAuthority('ROLE_ADMIN')">
            <a th:href="@{/editRecipe/{id}(id=${recipe.id})}" class="button">
              Muokkaa reseptiä
            </a>
            <a
              th:href="@{/deleteRecipe/{id}(id=${recipe.id})}"
              class="button delete">
              Poista resepti
            </a>
          </div>
        </div>

        <div class="favourites-button">
          <form
            th:action="@{/recipes/{id}/likeRecipe(id=${recipe.id})}"
            method="post">
            <input
              type="hidden"
              th:name="${_csrf.parameterName}"
              th:value="${_csrf.token}" />
            <button type="submit">Lisää suosikiksi</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
